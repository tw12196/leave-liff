<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ระบบขออนุมัติลางาน</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #17262b;
    --ink-soft: #5b6b70;
    --line: #e4e9ea;
    --paper: #f6f8f8;
    --card: #ffffff;
    --teal: #2e7d8c;
    --teal-deep: #1f5964;
    --teal-tint: #e7f1f2;
    --danger: #c05656;
    --danger-tint: #f8e9e9;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Sarabun', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #app { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; min-height: 100vh; }

  .state-screen {
    min-height: 70vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; gap: 10px;
    color: var(--ink-soft);
  }
  .spinner {
    width: 30px; height: 30px; border-radius: 50%;
    border: 3px solid var(--line); border-top-color: var(--teal);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-text { font-size: 12px; color: var(--ink-soft); margin-top: 6px; }

  .topbar { display: flex; align-items: center; gap: 12px; padding: 4px 2px 18px; }
  .avatar { width: 46px; height: 46px; border-radius: 50%; background: var(--teal-tint); border: 1px solid var(--line); object-fit: cover; }
  .who .name { font-weight: 600; font-size: 16px; line-height: 1.2; }
  .who .dept { font-size: 12.5px; color: var(--ink-soft); }

  .section-label { font-size: 12.5px; font-weight: 600; letter-spacing: .04em; color: var(--ink-soft); margin: 22px 2px 10px; text-transform: uppercase; }

  .balance-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .balance-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px 10px; text-align: center; }
  .balance-card .label { font-size: 12px; color: var(--ink-soft); margin-bottom: 6px; }
  .balance-card .remaining { font-size: 22px; font-weight: 700; color: var(--teal-deep); line-height: 1; }
  .balance-card .of-total { font-size: 11px; color: var(--ink-soft); margin-top: 4px; }
  .balance-card .bar-track { height: 4px; border-radius: 4px; background: var(--line); margin-top: 8px; overflow: hidden; }
  .balance-card .bar-fill { height: 100%; background: var(--teal); border-radius: 4px; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; margin-top: 6px; }
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  .leave-type-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .leave-type-opt { border: 1.5px solid var(--line); border-radius: 10px; padding: 10px 6px; text-align: center; font-size: 13px; color: var(--ink-soft); cursor: pointer; transition: border-color .15s, color .15s, background .15s; }
  .leave-type-opt.active { border-color: var(--teal); color: var(--teal-deep); background: var(--teal-tint); font-weight: 600; }
  input[type="date"], textarea { width: 100%; border: 1.5px solid var(--line); border-radius: 10px; padding: 11px 12px; font-size: 15px; font-family: inherit; color: var(--ink); background: #fff; }
  input[type="date"]:focus, textarea:focus { outline: none; border-color: var(--teal); }
  textarea { resize: vertical; min-height: 72px; }
  .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .day-preview { font-size: 13px; color: var(--ink-soft); margin-top: 10px; padding: 9px 12px; background: var(--paper); border-radius: 9px; }
  .day-preview strong { color: var(--teal-deep); }

  .submit-btn { width: 100%; margin-top: 20px; padding: 14px; border: none; border-radius: 12px; background: var(--teal); color: #fff; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .submit-btn:active { background: var(--teal-deep); }
  .submit-btn:disabled { background: #b7c3c5; }

  .banner { border-radius: 12px; padding: 13px 14px; font-size: 13.5px; margin-top: 14px; line-height: 1.5; }
  .banner.success { background: var(--teal-tint); color: var(--teal-deep); }
  .banner.error { background: var(--danger-tint); color: var(--danger); }

  .hint { font-size: 12px; color: var(--ink-soft); margin-top: 8px; }
</style>
</head>
<body>
<div id="app">
  <div id="loadingScreen" class="state-screen">
    <div class="spinner"></div>
    <div>กำลังโหลดข้อมูลค่ะ...</div>
    <div class="status-text" id="statusText"></div>
  </div>

  <div id="errorScreen" class="state-screen" style="display:none;">
    <div style="font-size:28px;">⚠️</div>
    <div id="errorMessage">เกิดข้อผิดพลาด</div>
  </div>

  <div id="mainScreen" style="display:none;">
    <div class="topbar">
      <img id="avatar" class="avatar" src="" alt="">
      <div class="who">
        <div class="name" id="empName">-</div>
        <div class="dept" id="empDept">-</div>
      </div>
    </div>

    <div class="section-label">วันลาคงเหลือ</div>
    <div class="balance-grid" id="balanceGrid"></div>

    <div class="section-label">ยื่นคำขอลางาน</div>
    <div class="card">
      <div class="field">
        <label>ประเภทการลา</label>
        <div class="leave-type-row" id="leaveTypeRow">
          <div class="leave-type-opt" data-type="sick">ลาป่วย</div>
          <div class="leave-type-opt" data-type="personal">ลากิจ</div>
          <div class="leave-type-opt" data-type="vacation">ลาพักร้อน</div>
        </div>
      </div>

      <div class="field">
        <label>ช่วงวันที่ลา</label>
        <div class="date-row">
          <input type="date" id="startDate">
          <input type="date" id="endDate">
        </div>
        <div class="day-preview" id="dayPreview">เลือกวันที่เพื่อดูจำนวนวันลา</div>
      </div>

      <div class="field">
        <label>เหตุผล (ไม่บังคับ)</label>
        <textarea id="reason" placeholder="ระบุเหตุผลโดยย่อ..."></textarea>
      </div>

      <button class="submit-btn" id="submitBtn">ส่งคำขอลา</button>
      <div class="hint">คำขอจะถูกส่งไปยังหัวหน้างานของคุณผ่าน LINE ทันทีเพื่อรออนุมัติ</div>
      <div id="resultBanner"></div>
    </div>
  </div>
</div>

<script>
  // ===== ค่าที่ต้องตั้ง =====
  const LIFF_ID = '2010663561-4ovJMpxr';
  // เอา Web App URL ของ Apps Script (ลงท้าย /exec) มาใส่ตรงนี้:
  const API_URL = 'https://script.google.com/macros/s/AKfycby4eYabeQ6xJ-60NtHE9QoRh6LKK6-l0IMf399bgSZ1EYIMRvaarHZqDiJO6KS_Xrla8g/exec';
  // ==========================

  window.onerror = function (message) {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('errorScreen').style.display = '';
    document.getElementById('errorMessage').innerHTML =
      'พบข้อผิดพลาดในหน้าเว็บ:<br><span style="font-size:12px;word-break:break-all;">' + message + '</span>';
    return true;
  };

  let profile = null;
  let selectedType = null;

  const leaveLabels = { sick: 'ลาป่วย', personal: 'ลากิจ', vacation: 'ลาพักร้อน' };

  function setStatus(msg) {
    const el = document.getElementById('statusText');
    if (el) el.textContent = msg;
  }

  function showScreen(id) {
    ['loadingScreen', 'errorScreen', 'mainScreen'].forEach(function (s) {
      document.getElementById(s).style.display = (s === id) ? '' : 'none';
    });
  }

  function showError(msg) {
    document.getElementById('errorMessage').textContent = msg;
    showScreen('errorScreen');
  }

  function init() {
    setStatus('เช็ก LIFF SDK...');
    if (typeof liff === 'undefined') {
      showError('โหลด LINE LIFF SDK ไม่สำเร็จ กรุณาเช็กการเชื่อมต่ออินเทอร์เน็ต แล้วลองเปิดใหม่อีกครั้งค่ะ');
      return;
    }
    setStatus('SDK พร้อม กำลัง liff.init()...');
    const stallTimer = setTimeout(function () {
      showError('การเชื่อมต่อกับ LINE ใช้เวลานานผิดปกติ กรุณาลองปิดแล้วเปิดหน้านี้ใหม่อีกครั้งค่ะ');
    }, 12000);

    liff.init({ liffId: LIFF_ID }).then(function () {
      clearTimeout(stallTimer);
      setStatus('init สำเร็จ กำลังเช็กสถานะล็อกอิน...');
      if (!liff.isLoggedIn()) {
        setStatus('ยังไม่ได้ล็อกอิน กำลังนำไปหน้า login...');
        liff.login();
        return;
      }
      setStatus('ล็อกอินแล้ว กำลังดึงโปรไฟล์...');
      return liff.getProfile();
    }).then(function (p) {
      if (!p) return;
      profile = p;
      document.getElementById('avatar').src = profile.pictureUrl || '';
      loadBalance();
    }).catch(function (err) {
      clearTimeout(stallTimer);
      showError('เชื่อมต่อ LINE ไม่สำเร็จ: ' + (err && err.message ? err.message : err));
    });
  }

  function loadBalance() {
    setStatus('กำลังดึงข้อมูลวันลา...');
    fetch(API_URL + '?action=getLeaveBalance&lineUserId=' + encodeURIComponent(profile.userId))
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (!data.found) {
          showError('ไม่พบข้อมูลของคุณในระบบ กรุณาติดต่อ HR เพื่อเพิ่มชื่อเข้าระบบก่อนใช้งาน (User ID: ' + profile.userId + ')');
          return;
        }
        renderProfile(data);
        renderBalances(data.balances);
        showScreen('mainScreen');
      })
      .catch(function (err) {
        showError('โหลดข้อมูลวันลาไม่สำเร็จ: ' + err);
      });
  }

  function renderProfile(data) {
    document.getElementById('empName').textContent = data.employeeName;
    document.getElementById('empDept').textContent = data.department + ' · หัวหน้างาน: ' + data.supervisorName;
  }

  function renderBalances(balances) {
    const grid = document.getElementById('balanceGrid');
    grid.innerHTML = '';
    ['sick', 'personal', 'vacation'].forEach(function (key) {
      const b = balances[key];
      const pct = b.quota > 0 ? Math.max(0, Math.min(100, (b.remaining / b.quota) * 100)) : 0;
      const card = document.createElement('div');
      card.className = 'balance-card';
      card.innerHTML =
        '<div class="label">' + leaveLabels[key] + '</div>' +
        '<div class="remaining">' + b.remaining + '</div>' +
        '<div class="of-total">จาก ' + b.quota + ' วัน</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>';
      grid.appendChild(card);
    });
  }

  document.getElementById('leaveTypeRow').addEventListener('click', function (e) {
    const opt = e.target.closest('.leave-type-opt');
    if (!opt) return;
    document.querySelectorAll('.leave-type-opt').forEach(function (el) { el.classList.remove('active'); });
    opt.classList.add('active');
    selectedType = opt.dataset.type;
  });

  function countWeekdays(start, end) {
    let count = 0;
    const cur = new Date(start);
    const last = new Date(end);
    while (cur <= last) {
      const day = cur.getDay();
      if (day !== 0 && day !== 6) count++;
      cur.setDate(cur.getDate() + 1);
    }
    return count;
  }

  function updateDayPreview() {
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    const preview = document.getElementById('dayPreview');
    if (!start || !end) { preview.textContent = 'เลือกวันที่เพื่อดูจำนวนวันลา'; return; }
    if (new Date(end) < new Date(start)) { preview.textContent = 'วันที่สิ้นสุดต้องไม่ก่อนวันเริ่มลา'; return; }
    const days = countWeekdays(start, end);
    preview.innerHTML = 'รวม <strong>' + days + ' วัน</strong> (นับเฉพาะวันจันทร์-ศุกร์)';
  }
  document.getElementById('startDate').addEventListener('change', updateDayPreview);
  document.getElementById('endDate').addEventListener('change', updateDayPreview);

  document.getElementById('submitBtn').addEventListener('click', function () {
    const banner = document.getElementById('resultBanner');
    banner.innerHTML = '';
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    const reason = document.getElementById('reason').value;

    if (!selectedType) return showBanner('error', 'กรุณาเลือกประเภทการลา');
    if (!start || !end) return showBanner('error', 'กรุณาเลือกช่วงวันที่ลา');
    if (new Date(end) < new Date(start)) return showBanner('error', 'วันที่สิ้นสุดต้องไม่ก่อนวันเริ่มลา');

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'กำลังส่งคำขอ...';

    fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'submitLeaveRequest',
        payload: {
          lineUserId: profile.userId,
          leaveType: selectedType,
          startDate: start,
          endDate: end,
          reason: reason
        }
      })
    })
      .then(function (res) { return res.json(); })
      .then(function (res) {
        btn.disabled = false;
        btn.textContent = 'ส่งคำขอลา';
        if (res.success) {
          showBanner('success', res.message);
          loadBalance();
        } else {
          showBanner('error', res.message);
        }
      })
      .catch(function (err) {
        btn.disabled = false;
        btn.textContent = 'ส่งคำขอลา';
        showBanner('error', 'ส่งคำขอไม่สำเร็จ: ' + err);
      });
  });

  function showBanner(type, msg) {
    document.getElementById('resultBanner').innerHTML = '<div class="banner ' + type + '">' + msg + '</div>';
  }

  init();
</script>
</body>
</html>
